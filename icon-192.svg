<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Fundo com bordas arredondadas -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Linha decorativa superior -->
  <rect x="24" y="24" width="60" height="4" rx="2" fill="url(#accent)"/>
  <!-- Letras DM -->
  <text x="96" y="108" font-size="72" font-weight="900" font-family="'Arial Black', sans-serif" fill="white" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2">DM</text>
  <!-- Ponto verde embaixo das letras -->
  <circle cx="96" cy="148" r="6" fill="url(#accent)"/>
</svg>
