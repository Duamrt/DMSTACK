<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM.Stack — Command Center</title>
<link rel="icon" type="image/svg+xml" href="icon-192.svg">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#000;--bg1:#08080c;--bg2:#0e0e14;--borda:rgba(255,255,255,0.06);--borda2:rgba(255,255,255,0.1);--t1:#fff;--t2:rgba(255,255,255,0.85);--t3:rgba(255,255,255,0.55);--t4:rgba(255,255,255,0.3);--t5:rgba(255,255,255,0.08);}
body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;overflow-x:hidden;min-height:100vh;}
::selection{background:rgba(255,255,255,0.15);}

/* LOGIN */
.login-wrap{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;}
.login-box{width:100%;max-width:340px;padding:24px;}
.login-logo{text-align:center;margin-bottom:48px;}
.login-logo h1{font-size:42px;font-weight:900;letter-spacing:-2px;}
.login-logo h1 span{color:rgba(255,255,255,0.15);}
.login-logo p{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:3px;margin-top:4px;}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;margin-bottom:10px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:rgba(255,255,255,0.25);}
.login-btn{width:100%;padding:14px;background:#fff;color:#000;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.login-btn:hover{opacity:0.85;}
.login-erro{text-align:center;font-size:12px;color:rgba(255,255,255,0.4);margin-top:12px;min-height:18px;}

/* APP LAYOUT */
.app{display:none;min-height:100vh;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:20px 28px;border-bottom:1px solid var(--borda);}
.topbar-logo{font-size:20px;font-weight:900;letter-spacing:-1px;cursor:default;}
.topbar-logo span{color:rgba(255,255,255,0.15);}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t4);letter-spacing:2px;font-weight:600;}
.topbar-status::before{content:'';width:6px;height:6px;background:#fff;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.topbar-time{font-size:14px;color:var(--t3);font-weight:300;font-variant-numeric:tabular-nums;}
.topbar-sair{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--t4);font-family:'Outfit',sans-serif;font-size:11px;padding:6px 14px;cursor:pointer;transition:all .2s;}
.topbar-sair:hover{border-color:rgba(255,255,255,0.2);color:var(--t2);}

/* CONTEUDO */
.content{max-width:800px;margin:0 auto;padding:32px 24px 120px;}

/* SAUDACAO */
.greeting{margin-bottom:32px;}
.greeting h2{font-size:clamp(24px,4vw,36px);font-weight:800;letter-spacing:-1px;line-height:1.2;}
.greeting p{font-size:14px;color:var(--t4);margin-top:6px;}

/* BRIEFING */
.briefing{margin-bottom:32px;}
.briefing-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.briefing-label{font-size:11px;font-weight:600;color:var(--t4);letter-spacing:2px;text-transform:uppercase;}
.briefing-refresh{background:none;border:1px solid var(--borda);border-radius:8px;color:var(--t4);font-family:'Outfit',sans-serif;font-size:11px;padding:6px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.briefing-refresh:hover{border-color:var(--borda2);color:var(--t2);}
.briefing-card{background:rgba(255,255,255,0.02);border:1px solid var(--borda);border-radius:14px;padding:24px;line-height:1.7;font-size:15px;color:var(--t2);}
.briefing-card p{margin-bottom:12px;}
.briefing-card p:last-child{margin-bottom:0;}
.briefing-card strong{color:var(--t1);font-weight:700;}
.briefing-empty{text-align:center;padding:48px 24px;color:var(--t4);font-size:14px;}
.briefing-empty button{margin-top:16px;background:#fff;color:#000;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;padding:12px 28px;cursor:pointer;}

/* ACOES */
.acoes{margin-bottom:40px;}
.acoes-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.acoes-label{font-size:11px;font-weight:600;color:var(--t4);letter-spacing:2px;text-transform:uppercase;}
.acoes-count{font-size:11px;color:var(--t4);}
.acao{display:flex;gap:14px;align-items:flex-start;padding:16px 18px;background:rgba(255,255,255,0.02);border:1px solid var(--borda);border-radius:12px;margin-bottom:8px;transition:all .2s;cursor:pointer;}
.acao:hover{border-color:var(--borda2);background:rgba(255,255,255,0.04);}
.acao.feito{opacity:0.25;}
.acao.feito .acao-titulo{text-decoration:line-through;}
.acao-check{width:20px;height:20px;border:2px solid rgba(255,255,255,0.2);border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.acao.feito .acao-check{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);}
.acao.feito .acao-check::after{content:'\2713';font-size:12px;color:var(--t2);}
.acao-body{flex:1;}
.acao-titulo{font-size:14px;font-weight:600;color:var(--t2);line-height:1.4;}
.acao-detalhe{font-size:12px;color:var(--t3);margin-top:3px;line-height:1.5;}
.acao-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:var(--t5);color:var(--t4);margin-top:6px;}

/* NUMEROS RAPIDOS */
.numeros{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:40px;}
.num-card{background:rgba(255,255,255,0.02);border:1px solid var(--borda);border-radius:12px;padding:16px;transition:border-color .2s;}
.num-card:hover{border-color:var(--borda2);}
.num-label{font-size:9px;font-weight:600;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.num-value{font-size:clamp(20px,2.5vw,32px);font-weight:800;letter-spacing:-1px;}
.num-sub{font-size:10px;color:var(--t4);margin-top:4px;}
.num-warn{border-left:2px solid rgba(255,255,255,0.4);}

/* CHAT */
.chat-area{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent, #000 20%);padding:12px 24px 20px;z-index:100;}
.chat-box{max-width:800px;margin:0 auto;display:flex;gap:10px;}
.chat-input{flex:1;padding:14px 18px;background:rgba(255,255,255,0.04);border:1px solid var(--borda2);border-radius:12px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.chat-input:focus{border-color:rgba(255,255,255,0.3);}
.chat-input::placeholder{color:var(--t4);}
.chat-send{background:#fff;color:#000;border:none;border-radius:12px;padding:0 24px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .2s;}
.chat-send:hover{opacity:0.85;}

/* CHAT MSGS */
.chat-msgs{max-width:800px;margin:0 auto 16px;display:none;flex-direction:column;gap:10px;max-height:300px;overflow-y:auto;padding:0 4px;}
.chat-msgs.has-msgs{display:flex;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--borda2);border-radius:2px;}
.chat-msg{font-size:13px;line-height:1.6;padding:12px 16px;border-radius:12px;max-width:85%;animation:fadeIn .2s;}
.chat-msg.bot{background:rgba(255,255,255,0.04);color:var(--t2);align-self:flex-start;border:1px solid var(--borda);}
.chat-msg.user{background:rgba(255,255,255,0.1);color:var(--t1);align-self:flex-end;}
.chat-msg.loading{color:var(--t4);font-style:italic;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* MOBILE */
@media(max-width:640px){
  .topbar{padding:14px 16px;}
  .content{padding:20px 16px 120px;}
  .numeros{grid-template-columns:1fr 1fr;gap:8px;}
  .num-card{padding:12px;}
  .briefing-card{padding:18px;font-size:14px;}
  .chat-area{padding:10px 16px 16px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="tela-login">
  <div class="login-box">
    <div class="login-logo">
      <h1>DM<span>.</span>Stack</h1>
      <p>COMMAND CENTER</p>
    </div>
    <input class="login-input" id="login-email" type="email" placeholder="Email" autocomplete="email">
    <input class="login-input" id="login-senha" type="password" placeholder="Senha" autocomplete="current-password">
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="login-erro"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">DM<span>.</span>Stack</div>
    <div class="topbar-right">
      <div class="topbar-status" id="app-status">CARREGANDO</div>
      <div class="topbar-time" id="app-time"></div>
      <button class="topbar-sair" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="content">
    <!-- SAUDACAO -->
    <div class="greeting">
      <h2 id="app-greeting">Bom dia, Duam.</h2>
      <p id="app-date"></p>
    </div>

    <!-- NUMEROS RAPIDOS -->
    <div class="numeros" id="app-numeros">
      <div class="num-card"><div class="num-label">Carregando</div><div class="num-value">—</div></div>
      <div class="num-card"><div class="num-label">Carregando</div><div class="num-value">—</div></div>
      <div class="num-card"><div class="num-label">Carregando</div><div class="num-value">—</div></div>
      <div class="num-card"><div class="num-label">Carregando</div><div class="num-value">—</div></div>
    </div>

    <!-- BRIEFING DO DIA -->
    <div class="briefing">
      <div class="briefing-header">
        <div class="briefing-label">Briefing do dia</div>
        <button class="briefing-refresh" onclick="gerarBriefing()">&#8635; Atualizar</button>
      </div>
      <div id="app-briefing">
        <div class="briefing-empty">
          <div>Nenhum briefing gerado hoje</div>
          <button onclick="gerarBriefing()">Gerar briefing com IA</button>
        </div>
      </div>
    </div>

    <!-- ACOES DO DIA -->
    <div class="acoes">
      <div class="acoes-header">
        <div class="acoes-label">Acoes do dia</div>
        <div class="acoes-count" id="app-acoes-count"></div>
      </div>
      <div id="app-acoes"><div style="text-align:center;padding:24px;color:var(--t4);font-size:13px;">Carregando...</div></div>
    </div>
  </div>

  <!-- CHAT FIXO NO FUNDO -->
  <div class="chat-area">
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-box">
      <input class="chat-input" id="chat-input" placeholder="Pergunta sobre seus negocios..." onkeydown="if(event.key==='Enter')enviarChat()">
      <button class="chat-send" onclick="enviarChat()">&#8594;</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// DM.STACK v2 — AGENTE, NAO DASHBOARD
// ══════════════════════════════════════════════════════
const DMS_URL = 'https://bkfkzauhnlulrtttgcii.supabase.co';
const DMS_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrZmt6YXVobmx1bHJ0dHRnY2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDkwODAsImV4cCI6MjA5MDUyNTA4MH0.VPgVt22TDQ_n17CUS9KSdCnbX4GtQgiEOHio2wK9mhI';

let _token = null;

// ── Helpers ──
function fmtR(v) { return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtK(v) { const n=Number(v)||0; return Math.abs(n)>=1000?'R$ '+(n/1000).toFixed(1)+'k':fmtR(n); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function hoje() { return new Date().toISOString().split('T')[0]; }

function dmsGet(t,q='') {
  return fetch(`${DMS_URL}/rest/v1/${t}${q}`, {
    headers: {'apikey':DMS_KEY, 'Authorization':'Bearer '+(_token||DMS_KEY), 'Accept':'application/json'}
  }).then(r=>r.json()).catch(()=>[]);
}
function dmsPost(t,b) {
  return fetch(`${DMS_URL}/rest/v1/${t}`, {
    method:'POST',
    headers: {'apikey':DMS_KEY, 'Authorization':'Bearer '+(_token||DMS_KEY), 'Content-Type':'application/json', 'Prefer':'return=representation'},
    body: JSON.stringify(b)
  }).then(r=>r.json()).catch(()=>[]);
}
function dmsPatch(t,q='',b={}) {
  return fetch(`${DMS_URL}/rest/v1/${t}${q}`, {
    method:'PATCH',
    headers: {'apikey':DMS_KEY, 'Authorization':'Bearer '+(_token||DMS_KEY), 'Content-Type':'application/json', 'Prefer':'return=minimal'},
    body: JSON.stringify(b)
  }).catch(()=>{});
}

function callEdge(fn, body={}) {
  return fetch(`${DMS_URL}/functions/v1/${fn}`, {
    method: 'POST',
    headers: {'apikey':DMS_KEY, 'Authorization':'Bearer '+(_token||DMS_KEY), 'Content-Type':'application/json'},
    body: JSON.stringify(body)
  }).then(r => r.json()).catch(e => ({ok:false, erro:e.message}));
}

// ── Clock & Greeting ──
function updateUI() {
  const n = new Date();
  const h = n.getHours();
  const saudacao = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
  document.getElementById('app-greeting').textContent = saudacao + ', Duam.';

  const dias = ['Domingo','Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado'];
  const meses = ['janeiro','fevereiro','marco','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  document.getElementById('app-date').textContent = dias[n.getDay()] + ', ' + n.getDate() + ' de ' + meses[n.getMonth()] + ' de ' + n.getFullYear();
  document.getElementById('app-time').textContent = String(h).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}

// ── Dados ──
let _dados = null; // { edr: {...}, rpm: {...} }

async function carregarDados() {
  const st = document.getElementById('app-status');
  try {
    const r = await callEdge('get-dashboard-data');
    if (r.ok) {
      _dados = r;
      st.textContent = 'LIVE';
      renderNumeros();
      gerarAcoesLocais();
    } else {
      st.textContent = 'OFFLINE';
      st.style.color = 'rgba(255,255,255,0.2)';
    }
  } catch(e) {
    st.textContent = 'ERRO';
    st.style.color = 'rgba(255,255,255,0.2)';
  }
}

function renderNumeros() {
  if (!_dados) return;
  const edr = _dados.edr || {};
  const rpm = _dados.rpm || {};
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mm = meses[new Date().getMonth()];

  document.getElementById('app-numeros').innerHTML = `
    <div class="num-card ${(edr.saldo||0)<0?'num-warn':''}">
      <div class="num-label">Saldo EDR ${mm}</div>
      <div class="num-value">${fmtK(edr.saldo||0)}</div>
      <div class="num-sub">Ent ${fmtK(edr.total_entrada||0)} · Sai ${fmtK(edr.total_saida||0)}</div>
    </div>
    <div class="num-card ${(edr.pct_mao||0)>40?'num-warn':''}">
      <div class="num-label">Mao de Obra</div>
      <div class="num-value">${edr.pct_mao||0}%</div>
      <div class="num-sub">${fmtK(edr.mao_obra||0)} de ${fmtK(edr.total_saida||0)}</div>
    </div>
    <div class="num-card">
      <div class="num-label">RPM — OS Abertas</div>
      <div class="num-value">${rpm.os_abertas||0}</div>
      <div class="num-sub">${rpm.os_hoje||0} hoje · ${rpm.entregues_mes||0} entregas ${mm}</div>
    </div>
    <div class="num-card">
      <div class="num-label">RPM — Faturado ${mm}</div>
      <div class="num-value">${fmtK(rpm.faturamento_mes||0)}</div>
      <div class="num-sub">Ticket ${fmtR(rpm.ticket_medio||0)}</div>
    </div>
  `;
}

// ── Acoes do dia (geradas localmente a partir dos dados) ──
function gerarAcoesLocais() {
  if (!_dados) return;
  const edr = _dados.edr || {};
  const rpm = _dados.rpm || {};
  const acoes = [];

  // EDR
  (edr.obras||[]).forEach(o => {
    if ((o.pct||0) > 85) acoes.push({pri:1, tag:'edr', titulo:`${o.nome} em ${o.pct}% do orcamento`, detalhe:`Gasto ${fmtK(o.gasto_total)} de ${fmtK(o.receita)}`});
  });
  if ((edr.saldo||0) < 0) acoes.push({pri:1, tag:'edr', titulo:`Saldo negativo: ${fmtR(edr.saldo)}`, detalhe:'Conferir repasses pendentes'});
  if ((edr.pct_mao||0) > 40) acoes.push({pri:2, tag:'edr', titulo:`Mao de obra em ${edr.pct_mao}%`, detalhe:'Ideal abaixo de 35-40%'});

  // RPM
  if ((rpm.entregue_sem_pgto||0) > 0) acoes.push({pri:1, tag:'rpm', titulo:`${rpm.entregue_sem_pgto} OS sem pagamento — ${fmtR(rpm.valor_sem_pgto)}`, detalhe:'Cobrar do Marcondes/Rafael'});
  if ((rpm.sem_mecanico||0) > 0) acoes.push({pri:2, tag:'rpm', titulo:`${rpm.sem_mecanico} OS sem mecanico`, detalhe:'Fluxo travado'});
  if ((rpm.peca_sem_custo||0) > 0) acoes.push({pri:2, tag:'rpm', titulo:`${rpm.peca_sem_custo} pecas sem custo`, detalhe:'Margem impossivel de calcular'});
  if ((rpm.dias_com_os||0) < 3) acoes.push({pri:2, tag:'rpm', titulo:`Carbon usou RPM so ${rpm.dias_com_os}/7 dias`, detalhe:'Frequencia baixa'});

  // Quinzena
  const dia = new Date().getDate();
  if ([14,15,16,30,31].includes(dia)) acoes.push({pri:1, tag:'edr', titulo:'Quinzena fecha — conferir diarias', detalhe:'Revisar faltas e valores'});

  acoes.sort((a,b) => a.pri - b.pri);

  const el = document.getElementById('app-acoes');
  const countEl = document.getElementById('app-acoes-count');

  if (!acoes.length) {
    el.innerHTML = '<div style="text-align:center;padding:32px;"><div style="font-size:20px;margin-bottom:8px;">&#10003;</div><div style="font-size:13px;color:var(--t3);">Nenhuma acao pendente.</div></div>';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = acoes.length + ' pendente' + (acoes.length!==1?'s':'');
  el.innerHTML = acoes.map((a,i) => `
    <div class="acao" onclick="this.classList.toggle('feito')">
      <div class="acao-check"></div>
      <div class="acao-body">
        <div class="acao-titulo">${esc(a.titulo)}</div>
        ${a.detalhe ? `<div class="acao-detalhe">${esc(a.detalhe)}</div>` : ''}
        <div class="acao-tag">${a.tag}</div>
      </div>
    </div>
  `).join('');
}

// ── Briefing IA ──
async function carregarBriefing() {
  const diags = await dmsGet('dmstack_diagnosticos', '?order=created_at.desc&limit=1');
  if (!Array.isArray(diags) || !diags.length) return;

  const d = diags[0];
  const hj = hoje();
  const dData = (d.data || d.created_at || '').substring(0, 10);
  const diasAtras = Math.floor((Date.now() - new Date(dData+'T12:00:00').getTime()) / 864e5);
  const freshLabel = diasAtras === 0 ? 'Hoje' : diasAtras === 1 ? 'Ontem' : diasAtras + ' dias atras';

  // Briefing direto ou fallback pro resumo
  let briefingText = d.briefing || '';
  if (!briefingText) {
    try { const raw = typeof d.raw_analysis === 'string' ? JSON.parse(d.raw_analysis) : d.raw_analysis; briefingText = raw?.analise?.briefing || d.resumo || ''; } catch(e) { briefingText = d.resumo || ''; }
  }

  // Problemas + recomendacoes
  const problemas = d.problemas || [];
  const recs = d.recomendacoes || [];

  if (!briefingText && !problemas.length && !recs.length) return;

  let html = '<div class="briefing-card">';
  if (briefingText) html += `<p>${esc(briefingText)}</p>`;
  if (problemas.length) {
    html += '<p><strong>Atencao:</strong></p>';
    problemas.forEach(p => { html += `<p style="padding-left:12px;border-left:2px solid rgba(255,255,255,0.15);margin-left:4px;">${esc(p)}</p>`; });
  }
  if (recs.length) {
    html += '<p><strong>Recomendacoes:</strong></p>';
    recs.forEach(r => { html += `<p style="padding-left:12px;border-left:2px solid rgba(255,255,255,0.08);margin-left:4px;">${esc(r)}</p>`; });
  }
  html += `<div style="text-align:right;font-size:10px;color:var(--t4);margin-top:12px;">${freshLabel} — gerado por IA</div>`;
  html += '</div>';

  document.getElementById('app-briefing').innerHTML = html;
}

async function gerarBriefing() {
  const el = document.getElementById('app-briefing');
  el.innerHTML = '<div class="briefing-empty" style="padding:24px;"><div style="font-size:13px;color:var(--t3);">Gerando briefing com IA... (30s)</div></div>';

  const r = await callEdge('agente-diario');
  if (r.ok) {
    await carregarBriefing();
  } else {
    el.innerHTML = `<div class="briefing-empty"><div>Erro: ${esc(r.erro || 'falha na Edge Function')}</div><button onclick="gerarBriefing()" style="margin-top:12px;">Tentar de novo</button></div>`;
  }
}

// ── Chat Interativo ──
function addMsg(text, tipo) {
  const el = document.getElementById('chat-msgs');
  el.classList.add('has-msgs');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + tipo;
  div.innerHTML = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function enviarChat() {
  const inp = document.getElementById('chat-input');
  const texto = inp.value.trim();
  if (!texto) return;
  inp.value = '';

  addMsg(esc(texto), 'user');
  addMsg('Pensando...', 'bot loading');

  const r = await callEdge('agente-chat', { pergunta: texto });

  // Remove "Pensando..."
  const msgs = document.getElementById('chat-msgs');
  const loading = msgs.querySelector('.loading');
  if (loading) loading.remove();

  if (r.ok && r.resposta) {
    addMsg(esc(r.resposta), 'bot');
  } else {
    addMsg('Nao consegui processar. Tenta de novo.', 'bot');
  }
}

// ── Auth ──
async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const erroEl = document.getElementById('login-erro');
  if (!email || !senha) { erroEl.textContent = 'Preencha email e senha.'; return; }
  erroEl.textContent = 'Entrando...';

  try {
    const r = await fetch(DMS_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {'apikey': DMS_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: senha})
    });
    const d = await r.json();
    if (!r.ok) { erroEl.textContent = d.error_description || 'Email ou senha incorretos.'; return; }
    _token = d.access_token;
    localStorage.setItem('dms_token', d.access_token);
    localStorage.setItem('dms_refresh', d.refresh_token);
    iniciarApp();
  } catch(e) { erroEl.textContent = 'Erro de conexao.'; }
}

async function refreshToken() {
  const rt = localStorage.getItem('dms_refresh');
  if (!rt) return false;
  try {
    const r = await fetch(DMS_URL + '/auth/v1/token?grant_type=refresh_token', {
      method: 'POST',
      headers: {'apikey': DMS_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({refresh_token: rt})
    });
    const d = await r.json();
    if (!r.ok) return false;
    _token = d.access_token;
    localStorage.setItem('dms_token', d.access_token);
    localStorage.setItem('dms_refresh', d.refresh_token);
    return true;
  } catch(e) { return false; }
}

function fazerLogout() {
  _token = null;
  localStorage.removeItem('dms_token');
  localStorage.removeItem('dms_refresh');
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-login').style.display = 'flex';
}

// ── Init ──
async function iniciarApp() {
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  updateUI();
  setInterval(updateUI, 30000);

  // Carrega tudo em paralelo
  await Promise.all([
    carregarDados(),
    carregarBriefing()
  ]);

  // Refresh a cada 5 min
  setInterval(async () => {
    await refreshToken();
    await carregarDados();
  }, 5 * 60 * 1000);
}

// Service Worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// Auto-login
(async () => {
  const saved = localStorage.getItem('dms_token');
  if (saved) {
    if (await refreshToken()) { iniciarApp(); return; }
    _token = saved;
    const r = await fetch(DMS_URL + '/auth/v1/user', {
      headers: {'apikey': DMS_KEY, 'Authorization': 'Bearer ' + saved}
    }).catch(() => ({ok:false}));
    if (r.ok) { iniciarApp(); return; }
  }
  document.getElementById('tela-login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-senha').addEventListener('keydown', e => { if(e.key==='Enter') fazerLogin(); });
  document.getElementById('login-email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-senha').focus(); });
})();
</script>
